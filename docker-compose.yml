services:
  # ── Village Infrastructure ──────────────────────────────────────
  # Yellow Pages MCP (9105) + Orchestrator (9200)
  # Always started. Persistent across simulation runs.
  # ─────────────────────────────────────────────────────────────────
  village-infra:
    build:
      context: .
      dockerfile: scripts/village/Dockerfile.infra
    container_name: village-infra
    hostname: village-infra
    ports:
      - "9105:9105"   # Yellow Pages MCP (direct HTTP)
      - "9200:9200"   # Orchestrator
    volumes:
      - ./scripts/village/runs:/app/runs
      - ./scripts/village/yellow-pages-roster.json:/app/yellow-pages-roster.json
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9200/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── AXL Mesh ────────────────────────────────────────────────────
  # All 4 P2P nodes in one container (profile: mesh).
  # Auto-generates PEM keys and configs at startup.
  # Nodes peer internally via 127.0.0.1.
  # Host reaches them through exposed api_ports.
  #
  #   Node           api_port  tcp_port  Listen (TLS)
  #   Yellow Pages     9002     7000     tls://0.0.0.0:9001
  #   Mayor            9004     7001     tls://0.0.0.0:9003
  #   Citizen A        9012     7100     tls://0.0.0.0:9011
  #   Citizen B        9013     7101     tls://0.0.0.0:9010
  # ─────────────────────────────────────────────────────────────────
  village-mesh:
    build:
      context: .
      dockerfile: axl/Dockerfile.mesh
    container_name: village-mesh
    hostname: village-mesh
    profiles: ["mesh"]
    ports:
      - "9002:9002"   # Yellow Pages AXL node API
      - "9004:9004"   # Mayor AXL node API
      - "9012:9012"   # Citizen A AXL node API
      - "9013:9013"   # Citizen B AXL node API
    healthcheck:
      test: ["CMD", "sh", "-c",
        "curl -fsS http://localhost:9002/topology &&
         curl -fsS http://localhost:9012/topology &&
         curl -fsS http://localhost:9013/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      village-infra:
        condition: service_healthy

  # ── Simulation UI ────────────────────────────────────────────────
  # React TypeScript app.  Reads gini_timeseries.json from the runs
  # directory and displays Gini chart + actions per citizen per epoch.
  # ─────────────────────────────────────────────────────────────────
  village-ui:
    build:
      context: ./scripts/village/ui
    container_name: village-ui
    ports:
      - "8080:80"
    volumes:
      - ./scripts/village/runs:/data/runs:ro
    depends_on:
      village-infra:
        condition: service_healthy

services:
  # ── Village Infrastructure ──────────────────────────────────────
  # Yellow Pages MCP (9105) + Orchestrator (9200)
  # Always started. Persistent across simulation runs.
  # ─────────────────────────────────────────────────────────────────
  village-infra:
    build:
      context: .
      dockerfile: scripts/village/Dockerfile.infra
    container_name: village-infra
    hostname: village-infra
    ports:
      - "9200:9200"   # Orchestrator
    volumes:
      - ./scripts/village/runs:/app/runs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9200/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── AXL Mesh ────────────────────────────────────────────────────
  # All P2P nodes in one container (profile: mesh).
  # NUM_CITIZENS env var controls how many citizen nodes are created
  # (default 10).  Auto-generates PEM keys and configs at startup.
  # Nodes peer internally via 127.0.0.1.
  #
  #   Node group     api_ports         tcp_ports  Listen (TLS)
  #   Yellow Pages   9002              7000       tls://0.0.0.0:9001
  #   Mayor          9004              7001       tls://0.0.0.0:9003
  #   Citizens       9012-9021         7100-7109  tls://0.0.0.0:9011-9020
  # ─────────────────────────────────────────────────────────────────
  village-mesh:
    build:
      context: .
      dockerfile: axl/Dockerfile.mesh
    container_name: village-mesh
    hostname: village-mesh
    profiles: ["mesh"]
    ports:
      - "9002:9002"     # Yellow Pages
      - "9004:9004"     # Mayor
      - "9012-9021:9012-9021"  # 10 citizens
    healthcheck:
      test: ["CMD", "sh", "-c",
        "curl -fsS http://localhost:9002/topology &&
         curl -fsS http://localhost:9012/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      village-infra:
        condition: service_healthy

  # ── Simulation UI ────────────────────────────────────────────────
  # React TypeScript app.  Reads gini_timeseries.json from the runs
  # directory and displays Gini chart + actions per citizen per epoch.
  # ─────────────────────────────────────────────────────────────────
  village-ui:
    build:
      context: ./scripts/village/ui
    container_name: village-ui
    ports:
      - "8080:80"
    volumes:
      - ./scripts/village/runs:/data/runs:ro
    depends_on:
      village-infra:
        condition: service_healthy
